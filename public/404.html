<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VisitorPasses</title>
    <!--
      GitHub Pages is a static file server -- it has no idea your app uses
      client-side routing (React Router), so any direct load or refresh on a
      nested path like /triumph-towers-chsl/guard/dashboard has no matching
      file on disk and GitHub serves this 404.html instead.

      This is the standard, widely-used fix for single-page apps on GitHub
      Pages: https://github.com/rafgraph/spa-github-pages

      This script encodes the attempted path into a query string and redirects
      to the site root. index.html has a matching script that decodes it and
      restores the real URL via history.replaceState before React Router
      mounts -- so the user ends up exactly where they intended, with one
      extra redirect hop.

      pathSegmentsToKeep is 0 because visitorpasses.in is served from a custom
      domain root (not a github.io/repo-name/ subpath).
    -->
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
